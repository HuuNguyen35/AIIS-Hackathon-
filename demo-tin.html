<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>HandsOnDeck — Responder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--surface:#EDE8DC;--text:#1A1207;--text2:#8B7355;--accent:#C4391C;--accent-soft:rgba(196,57,28,.08);--success:#4A7C59;--success-soft:rgba(74,124,89,.1);--amber:#C0854A;--amber-soft:rgba(192,133,74,.1);--border:#D4C9B5;--white:#FFFDF9;--font-h:'Playfair Display',serif;--font-b:'Inter',sans-serif}
html,body{height:100%;font-family:var(--font-b);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:99999;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E")}

@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.r{animation:rise .45s cubic-bezier(.16,1,.3,1) both}

.back{position:fixed;top:max(env(safe-area-inset-top),14px);left:14px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(26,18,7,.06)}
.back:active{transform:scale(.9)}
.back svg{width:18px;height:18px;color:var(--text)}

.header{padding:max(env(safe-area-inset-top),16px) 20px 16px 68px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header h1{font-family:var(--font-h);font-size:22px;font-weight:800}
.count{font-size:13px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:6px 14px;border-radius:50px}

.list{flex:1;overflow-y:auto;padding:0 16px 100px}

.case{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,18,7,.03)}
.case-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.case h3{font-family:var(--font-h);font-size:18px;font-weight:700}
.case-floor{font-size:11px;font-weight:700;color:var(--text2);background:var(--surface);padding:4px 12px;border-radius:50px}
.case-addr{font-size:13px;color:var(--text2);margin-bottom:10px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:10px;font-weight:700;padding:5px 12px;border-radius:50px;letter-spacing:.5px;text-transform:uppercase}
.badge-dis{background:var(--accent-soft);color:var(--accent)}
.badge-unc{background:var(--accent-soft);color:var(--accent)}
.badge-enr{background:var(--amber-soft);color:var(--amber)}
.badge-safe{background:var(--success-soft);color:var(--success)}
.nb-tag{font-size:12px;font-weight:700;color:var(--success);background:var(--success-soft);padding:6px 14px;border-radius:50px;display:inline-block;margin-bottom:8px}
.case-meds{font-size:12px;color:var(--text2);margin-bottom:4px;font-style:italic}
.case-time{font-size:11px;color:var(--border);margin-top:4px}

.safe-card{background:var(--success-soft);border:1px solid rgba(74,124,89,.15);border-radius:20px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.safe-card .sc-dot{width:10px;height:10px;border-radius:50%;background:var(--success);flex-shrink:0}
.safe-card .sc-info h4{font-size:15px;font-weight:700;color:var(--success)}
.safe-card .sc-info p{font-size:12px;color:var(--text2)}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:10px;padding:40px}
.empty-dot{width:12px;height:12px;border-radius:50%;background:var(--success);animation:pulseDot 2s ease infinite}

.sim-row{position:fixed;bottom:max(env(safe-area-inset-bottom),16px);left:16px;right:16px;z-index:600;display:flex;gap:10px}
.sim{flex:1;height:56px;background:var(--accent);color:#fff;border:none;border-radius:16px;font-family:var(--font-b);font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(196,57,28,.15);transition:transform .1s}
.sim:active{transform:scale(.97)}
.sim-reset{background:var(--surface);color:var(--text2);box-shadow:none;border:1px solid var(--border);flex:0 0 auto;padding:0 20px}

.toast{position:fixed;top:max(env(safe-area-inset-top),16px);left:50%;transform:translateX(-50%) translateY(-80px);z-index:9000;background:var(--text);color:var(--white);font-size:14px;font-weight:600;padding:14px 24px;border-radius:14px;white-space:nowrap;transition:transform .35s cubic-bezier(.16,1,.3,1);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<button class="back" onclick="window.history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>

<div class="header"><h1>HandsOnDeck</h1></div>
<div class="list" id="list"></div>
<div class="sim-row"><button class="sim" id="sim">SIMULATE FLOOD WATCH</button><button class="sim sim-reset" id="reset">RESET</button></div>
<div class="toast" id="toast"></div>

<script>
var API=window.location.origin,H={'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},seenIds={};

setInterval(poll,3000);poll();

function poll(){
  fetch(API+'/users',{headers:{'ngrok-skip-browser-warning':'1'}}).then(function(r){return r.json()}).then(function(d){
    var u=Array.isArray(d)?d:(d.users||[]);
    var active=u.filter(function(x){return x.status==='uncontacted'||x.status==='neighbor_en_route'});
    active.forEach(function(x){if(!seenIds[x.id])seenIds[x.id]=true});
    var resolved=u.filter(function(x){return x.status==='safe'&&seenIds[x.id]});
    renderList(active,resolved);
  }).catch(function(){});
}

function renderList(active,safe){
  var el=document.getElementById('list');el.textContent='';

  if(!active.length&&!safe.length){
    var e=document.createElement('div');e.className='empty';
    var dot=document.createElement('div');dot.className='empty-dot';
    var txt=document.createElement('div');txt.textContent='No cases. System monitoring.';
    e.appendChild(dot);e.appendChild(txt);el.appendChild(e);return;
  }

  active.forEach(function(u){
    var card=document.createElement('div');card.className='case';
    var top=document.createElement('div');top.className='case-top';
    var h=document.createElement('h3');h.textContent=u.name;top.appendChild(h);
    var fl=document.createElement('span');fl.className='case-floor';fl.textContent='Floor '+(u.floor||0);top.appendChild(fl);
    card.appendChild(top);
    var addr=document.createElement('div');addr.className='case-addr';addr.textContent=u.address||'';card.appendChild(addr);
    var badges=document.createElement('div');badges.className='badges';
    if(u.disability){var db=document.createElement('span');db.className='badge badge-dis';db.textContent=u.disability;badges.appendChild(db)}
    var sb=document.createElement('span');sb.className='badge '+(u.status==='uncontacted'?'badge-unc':'badge-enr');sb.textContent=u.status==='uncontacted'?'NEEDS HELP':'EN ROUTE';badges.appendChild(sb);
    card.appendChild(badges);
    if(u.status==='neighbor_en_route'){var nb=document.createElement('div');nb.className='nb-tag';nb.textContent='Neighbor handling — monitoring only';card.appendChild(nb)}
    if(u.medications){var med=document.createElement('div');med.className='case-meds';med.textContent='Meds: '+u.medications;card.appendChild(med)}
    var tm=document.createElement('div');tm.className='case-time';tm.textContent='Updated: '+new Date(u.updatedAt).toLocaleTimeString();card.appendChild(tm);
    el.appendChild(card);
  });

  safe.forEach(function(u){
    var sc=document.createElement('div');sc.className='safe-card';
    var dot=document.createElement('div');dot.className='sc-dot';sc.appendChild(dot);
    var info=document.createElement('div');info.className='sc-info';
    var h=document.createElement('h4');h.textContent=u.name+' — Safe';info.appendChild(h);
    var p=document.createElement('p');p.textContent=u.address||'';info.appendChild(p);
    sc.appendChild(info);
    el.appendChild(sc);
  });
}

document.getElementById('sim').addEventListener('click',function(){
  var b=this;b.disabled=true;b.textContent='Triggering...';
  fetch(API+'/test-trigger',{method:'POST',headers:H})
  .then(function(){toast('Flood watch triggered for San Antonio');b.disabled=false;b.textContent='SIMULATE FLOOD WATCH';poll()})
  .catch(function(){b.disabled=false;b.textContent='SIMULATE FLOOD WATCH'});
});

document.getElementById('reset').addEventListener('click',function(){
  var b=this;b.disabled=true;b.textContent='Resetting...';
  fetch(API+'/reset',{method:'POST',headers:H})
  .then(function(){toast('Simulation reset');b.disabled=false;b.textContent='RESET';seenIds={};poll()})
  .catch(function(){b.disabled=false;b.textContent='RESET'});
});

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
</script>
</body>
</html>
