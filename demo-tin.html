<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>HandsOnDeck — Responder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#C4391C;--accent-soft:rgba(196,57,28,.15);--success:#3fb950;--success-soft:rgba(63,185,80,.12);--amber:#d29922;--amber-soft:rgba(210,153,34,.12);--white:#fff;--font:'Inter',system-ui,sans-serif}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header h1{font-size:18px;font-weight:800;letter-spacing:1px}
.header .count{font-size:13px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:5px 14px;border-radius:10px}

.toggle{display:flex;background:var(--surface);border-radius:10px;padding:3px;margin:12px 16px;border:1px solid var(--border)}
.toggle button{flex:1;padding:10px;border:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s}
.toggle button.active{background:var(--border);color:var(--text)}

#map{width:100%;height:300px;display:none;flex-shrink:0}
.leaflet-container{background:var(--bg)}

.list{flex:1;overflow-y:auto;padding:0 16px 100px}
.case{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.case-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.case h3{font-size:16px;font-weight:700}
.case-floor{font-size:11px;font-weight:700;color:var(--text2);background:rgba(139,148,158,.1);padding:3px 10px;border-radius:6px}
.case-addr{font-size:13px;color:var(--text2);margin-bottom:8px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
.badge-dis{background:var(--accent-soft);color:var(--accent)}
.badge-unc{background:var(--accent-soft);color:var(--accent)}
.badge-enr{background:var(--amber-soft);color:var(--amber)}
.nb-tag{font-size:11px;font-weight:700;color:var(--success);background:var(--success-soft);padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:6px}
.case-meds{font-size:12px;color:var(--text2);margin-bottom:4px;font-style:italic}
.case-time{font-size:11px;color:var(--border)}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:10px;padding:40px}
.empty-dot{width:10px;height:10px;border-radius:50%;background:var(--success);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

.sim{position:fixed;bottom:max(env(safe-area-inset-bottom),16px);left:16px;right:16px;z-index:600;height:56px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(196,57,28,.3);transition:transform .1s}
.sim:active{transform:scale(.97)}

.toast{position:fixed;top:max(env(safe-area-inset-top),16px);left:50%;transform:translateX(-50%) translateY(-80px);z-index:9000;background:var(--text);color:var(--bg);font-size:14px;font-weight:600;padding:14px 24px;border-radius:12px;white-space:nowrap;transition:transform .35s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header"><h1>HANDSONDECK</h1><div class="count" id="count">0</div></div>
<div class="toggle"><button id="t-map">Map</button><button id="t-list" class="active">List</button></div>
<div id="map"></div>
<div class="list" id="list"></div>
<button class="sim" id="sim">SIMULATE FLOOD WATCH</button>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var API=window.location.origin,H={'Content-Type':'application/json','ngrok-skip-browser-warning':'1'};
var lmap=null,markers={},view='list';
var SC={uncontacted:'#C4391C',neighbor_en_route:'#d29922',safe:'#3fb950'};

document.getElementById('t-map').addEventListener('click',function(){view='map';this.classList.add('active');document.getElementById('t-list').classList.remove('active');document.getElementById('map').style.display='block';document.getElementById('list').style.display='none';initMap();setTimeout(function(){lmap.invalidateSize()},100)});
document.getElementById('t-list').addEventListener('click',function(){view='list';this.classList.add('active');document.getElementById('t-map').classList.remove('active');document.getElementById('map').style.display='none';document.getElementById('list').style.display=''});

function initMap(){if(lmap)return;lmap=L.map('map',{zoomControl:true}).setView([29.4241,-98.4936],11);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20}).addTo(lmap)}

setInterval(poll,3000);poll();

function poll(){
  fetch(API+'/users',{headers:{'ngrok-skip-browser-warning':'1'}}).then(function(r){return r.json()}).then(function(d){
    var u=Array.isArray(d)?d:(d.users||[]);
    var active=u.filter(function(x){return x.status!=='safe'});
    document.getElementById('count').textContent=active.length+' unresolved';
    renderList(active);
    updateMarkers(u);
  }).catch(function(){});
}

function updateMarkers(users){
  if(!lmap)return;var seen={};
  users.forEach(function(u){if(!u.lat||!u.lng)return;seen[u.id]=true;var c=SC[u.status]||'#C4391C';
    if(markers[u.id])markers[u.id].setStyle({fillColor:c,color:'#fff'});
    else{var m=L.circleMarker([u.lat,u.lng],{radius:8,fillColor:c,color:'#fff',weight:2,fillOpacity:.9}).addTo(lmap);m.bindTooltip(u.name+' ('+u.status+')',{direction:'top',offset:[0,-10]});markers[u.id]=m}
  });
  Object.keys(markers).forEach(function(id){if(!seen[id]){lmap.removeLayer(markers[id]);delete markers[id]}});
}

function renderList(list){
  var el=document.getElementById('list');el.textContent='';
  if(!list.length){var e=document.createElement('div');e.className='empty';var dot=document.createElement('div');dot.className='empty-dot';var txt=document.createElement('div');txt.textContent='No active cases';e.appendChild(dot);e.appendChild(txt);el.appendChild(e);return}
  list.forEach(function(u){
    var card=document.createElement('div');card.className='case';
    var top=document.createElement('div');top.className='case-top';
    var h=document.createElement('h3');h.textContent=u.name;top.appendChild(h);
    var fl=document.createElement('span');fl.className='case-floor';fl.textContent='Floor '+(u.floor||0);top.appendChild(fl);
    card.appendChild(top);
    var addr=document.createElement('div');addr.className='case-addr';addr.textContent=u.address||'';card.appendChild(addr);
    var badges=document.createElement('div');badges.className='badges';
    if(u.disability){var db=document.createElement('span');db.className='badge badge-dis';db.textContent=u.disability;badges.appendChild(db)}
    var sb=document.createElement('span');sb.className='badge '+(u.status==='uncontacted'?'badge-unc':'badge-enr');sb.textContent=u.status.replace('_',' ');badges.appendChild(sb);
    card.appendChild(badges);
    if(u.status==='neighbor_en_route'){var nb=document.createElement('div');nb.className='nb-tag';nb.textContent='Neighbor handling — monitoring only';card.appendChild(nb)}
    if(u.medications){var med=document.createElement('div');med.className='case-meds';med.textContent='Meds: '+u.medications;card.appendChild(med)}
    var tm=document.createElement('div');tm.className='case-time';tm.textContent='Updated: '+new Date(u.updatedAt).toLocaleTimeString();card.appendChild(tm);
    el.appendChild(card);
  });
}

document.getElementById('sim').addEventListener('click',function(){var b=this;b.disabled=true;b.textContent='Triggering...';
  fetch(API+'/test-trigger',{method:'POST',headers:H}).then(function(){toast('Flood watch triggered for San Antonio');b.disabled=false;b.textContent='SIMULATE FLOOD WATCH';poll()}).catch(function(){b.disabled=false;b.textContent='SIMULATE FLOOD WATCH'})});

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
</script>
</body>
</html>
