<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" />
  <title>BLOCK DASHBOARD</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ================================================================
       BLOCK DASHBOARD — Emergency Operations Center Interface
       ================================================================ */

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:          #0a0a0a;
      --bg-2:        #101010;
      --bg-3:        #181818;
      --bg-4:        #1e1e1e;
      --border:      #1f1f1f;
      --border-2:    #2a2a2a;
      --red:         #ff2020;
      --red-dim:     rgba(255, 32, 32, 0.15);
      --yellow:      #ffc400;
      --yellow-dim:  rgba(255, 196, 0, 0.15);
      --green:       #00cc44;
      --green-dim:   rgba(0, 204, 68, 0.15);
      --text:        #d8d8d8;
      --text-2:      #888;
      --text-3:      #555;
      --mono:        'Consolas', 'Courier New', monospace;
      --sans:        'Segoe UI', 'Arial', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* ================================================================
       STATS BAR
       ================================================================ */

    #stats-bar {
      height: 68px;
      flex-shrink: 0;
      background: var(--bg-2);
      border-bottom: 2px solid var(--red);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 0;
      position: relative;
      z-index: 100;
    }

    /* ================================================================
       MAIN AREA
       ================================================================ */

    #main-area {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    /* ================================================================
       TRANSCRIPT FEED (LEFT PANEL)
       ================================================================ */

    #transcript-feed {
      width: 296px;
      flex-shrink: 0;
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ================================================================
       MAP
       ================================================================ */

    #map-container {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Leaflet overrides */
    .leaflet-container {
      background: #0a0a0a;
      font-family: var(--sans);
    }

    .leaflet-bar {
      border: none !important;
      box-shadow: none !important;
    }

    .leaflet-control-zoom a {
      background: var(--bg-2) !important;
      color: var(--text-2) !important;
      border: 1px solid var(--border-2) !important;
      border-radius: 0 !important;
      width: 28px !important;
      height: 28px !important;
      line-height: 26px !important;
      font-size: 16px !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--bg-3) !important;
      color: var(--text) !important;
    }

    .leaflet-control-zoom-in {
      border-bottom: 1px solid var(--border-2) !important;
    }

    .leaflet-control-attribution {
      background: rgba(10, 10, 10, 0.75) !important;
      color: var(--text-3) !important;
      font-size: 9px !important;
      border-top: 1px solid var(--border) !important;
    }

    .leaflet-control-attribution a {
      color: var(--text-3) !important;
    }

    /* ================================================================
       PERSON CARD PANEL (RIGHT)
       ================================================================ */

    #person-card-panel {
      width: 0;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.18s ease;
      background: var(--bg-2);
      border-left: 1px solid var(--border);
    }

    #person-card-panel.open {
      width: 400px;
    }

    #person-card {
      width: 400px;
      height: 100%;
      overflow-y: auto;
    }

    /* ================================================================
       STATS BAR INTERNALS
       ================================================================ */

    .stats-brand {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: bold;
      color: var(--red);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-right: 28px;
      flex-shrink: 0;
      line-height: 1.2;
    }

    .stats-brand small {
      display: block;
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 2px;
      font-weight: normal;
      margin-top: 3px;
    }

    .v-div {
      width: 1px;
      height: 38px;
      background: var(--border-2);
      margin: 0 22px;
      flex-shrink: 0;
    }

    .stats-group {
      display: flex;
      gap: 28px;
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-lbl {
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: bold;
      line-height: 1;
      color: var(--text);
    }

    .stat-val.col-red    { color: var(--red); }
    .stat-val.col-green  { color: var(--green); }

    .stats-alert {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .alert-lbl {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 8px;
      color: var(--red);
      letter-spacing: 2px;
      font-family: var(--mono);
      text-transform: uppercase;
    }

    .alert-dot {
      width: 6px;
      height: 6px;
      background: var(--red);
      flex-shrink: 0;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .alert-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      letter-spacing: 1px;
    }

    .stats-sync {
      margin-left: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .sync-lbl {
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 2px;
      font-family: var(--mono);
      text-transform: uppercase;
    }

    .sync-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-3);
    }

    /* ================================================================
       TRANSCRIPT FEED INTERNALS
       ================================================================ */

    .feed-hdr {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .feed-title {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .feed-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      background: var(--bg-3);
      border: 1px solid var(--border-2);
      padding: 1px 7px;
    }

    #transcript-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .feed-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .feed-item:hover {
      background: var(--bg-3);
    }

    .feed-item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .feed-name {
      font-size: 13px;
      font-weight: bold;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-excerpt {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-2);
      line-height: 1.5;
      word-break: break-word;
    }

    /* ================================================================
       PERSON CARD INTERNALS
       ================================================================ */

    .card-wrap {
      padding: 16px;
    }

    .card-hdr {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .card-name {
      font-size: 22px;
      font-weight: bold;
      color: var(--text);
      line-height: 1.2;
    }

    .card-uid {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .card-close {
      background: none;
      border: 1px solid var(--border-2);
      color: var(--text-2);
      cursor: pointer;
      font-size: 13px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-close:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .card-status-row {
      margin-bottom: 16px;
    }

    .card-section {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .card-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .section-hdr {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 10px;
    }

    .card-field:last-child { margin-bottom: 0; }

    .f-lbl {
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .f-val {
      font-size: 13px;
      color: var(--text);
    }

    .f-val.mono {
      font-family: var(--mono);
    }

    .card-transcript {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid var(--border-2);
      padding: 10px;
      background: var(--bg);
    }

    .card-actions {
      padding-top: 4px;
    }

    .btn-safe {
      width: 100%;
      padding: 11px;
      background: none;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .btn-safe:hover:not(:disabled) {
      background: var(--green);
      color: #000;
    }

    .btn-safe:disabled {
      opacity: 0.45;
      cursor: default;
    }

    /* ================================================================
       BADGES
       ================================================================ */

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 8px;
      font-weight: bold;
      letter-spacing: 1px;
      padding: 2px 6px;
      text-transform: uppercase;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .badge-lg {
      font-size: 10px;
      padding: 4px 10px;
      letter-spacing: 2px;
    }

    .badge-red    { background: var(--red-dim);    color: var(--red);    border: 1px solid var(--red); }
    .badge-yellow { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow); }
    .badge-green  { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green); }

    /* ================================================================
       MAP TOOLTIP (marker hover)
       ================================================================ */

    .marker-tooltip {
      background: var(--bg-2) !important;
      border: 1px solid var(--border-2) !important;
      color: var(--text) !important;
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 8px;
      box-shadow: none !important;
      border-radius: 0 !important;
    }

    .marker-tooltip::before { display: none !important; }

    /* ================================================================
       ERROR BANNER
       ================================================================ */

    #error-banner {
      position: fixed;
      top: 68px;
      left: 296px;
      right: 0;
      background: rgba(255, 32, 32, 0.1);
      border-bottom: 1px solid var(--red);
      color: var(--red);
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 14px;
      letter-spacing: 1px;
      z-index: 200;
      display: none;
    }
  </style>
</head>
<body>

  <div id="stats-bar"></div>

  <div id="main-area">
    <div id="transcript-feed"></div>

    <div id="map-container">
      <div id="map"></div>
    </div>

    <div id="person-card-panel">
      <div id="person-card"></div>
    </div>
  </div>

  <div id="error-banner"></div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Global config & shared state bus -->
  <script>
    window.API_BASE = 'https://6e7b-66-253-168-123.ngrok-free.app';

    window.BlockDashboard = {
      _subs: [],
      currentUsers: [],

      subscribe: function (fn) {
        this._subs.push(fn);
      },

      emit: function (data) {
        var users = Array.isArray(data) ? data : (data.users || []);
        this.currentUsers = users;
        this._subs.forEach(function (fn) { fn(data); });
      },

      openCard: function (user) { /* implemented by PersonCard.js */ }
    };
  </script>

  <script src="Stats.js"></script>
  <script src="TranscriptFeed.js"></script>
  <script src="PersonCard.js"></script>
  <script src="Dashboard.js"></script>
</body>
</html>
