<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>HandsOnDeck — Neighbor Response</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--surface:#EDE8DC;--text:#1A1207;--text2:#8B7355;--accent:#C4391C;--accent-soft:rgba(196,57,28,.08);--success:#4A7C59;--success-soft:rgba(74,124,89,.1);--teal:#2a9d8f;--border:#D4C9B5;--white:#FFFDF9;--font-h:'Playfair Display',serif;--font-b:'Inter',sans-serif}
html,body{min-height:100%;font-family:var(--font-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:99999;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E")}

@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.r{animation:rise .5s cubic-bezier(.16,1,.3,1) both}
.r1{animation-delay:.08s}.r2{animation-delay:.16s}.r3{animation-delay:.24s}.r4{animation-delay:.32s}

.content{padding:24px 20px 60px;max-width:500px;margin:0 auto}

.alert-banner{background:var(--accent-soft);border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:24px}
.alert-dot{width:12px;height:12px;background:var(--accent);border-radius:50%;flex-shrink:0;animation:pulseDot 1.5s ease infinite}
.alert-banner span{font-size:15px;font-weight:700;color:var(--accent)}

.person-card{background:var(--white);border-radius:24px;padding:28px 24px;box-shadow:0 2px 16px rgba(0,0,0,.04);margin-bottom:20px}
.person-name{font-family:var(--font-h);font-size:28px;font-weight:800;margin-bottom:20px;line-height:1.2}
.pf{display:flex;flex-direction:column;gap:2px;margin-bottom:14px}
.pf:last-child{margin-bottom:0}
.pf-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.pf-value{font-size:16px;font-weight:600}
.pf-value.highlight{color:var(--accent)}

.map-wrap{border-radius:16px;overflow:hidden;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.map-wrap img{width:100%;height:auto;display:block}

.actions{display:flex;flex-direction:column;gap:12px}
.btn-action{width:100%;padding:20px;border:none;border-radius:16px;font-family:var(--font-b);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;min-height:64px;transition:transform .1s}
.btn-action:active:not(:disabled){transform:scale(.97)}
.btn-action:disabled{opacity:.5;cursor:default}
.btn-action svg{width:22px;height:22px}
.btn-onway{background:var(--success);color:#fff;box-shadow:0 6px 24px rgba(74,124,89,.2)}
.btn-thesafe{background:var(--white);color:var(--teal);border:2.5px solid var(--teal)}

.result{display:none;text-align:center;padding:28px;background:var(--white);border-radius:24px;box-shadow:0 2px 12px rgba(0,0,0,.04);animation:rise .4s ease both}
.result.show{display:block}
.result-icon{width:60px;height:60px;border-radius:50%;background:var(--success-soft);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
.result-icon svg{width:28px;height:28px;color:var(--success)}
.result h3{font-family:var(--font-h);font-size:22px;font-weight:800;margin-bottom:6px}
.result p{font-size:15px;color:var(--text2);line-height:1.5}

.loading{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px}
</style>
</head>
<body>

<div class="content" id="content">
  <div class="loading">Loading emergency details...</div>
</div>

<script>
var API=window.location.origin,H={'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},TID='demo-anh';

fetch(API+'/users',{headers:{'ngrok-skip-browser-warning':'1'}})
.then(function(r){return r.json()})
.then(function(d){
  var users=Array.isArray(d)?d:(d.users||[]);
  var user=users.find(function(u){return u.id===TID});
  if(!user)throw new Error('User not found');
  render(user);
})
.catch(function(e){document.getElementById('content').textContent='Could not load: '+e.message});

function render(u){
  var c=document.getElementById('content');c.textContent='';

  var banner=document.createElement('div');banner.className='alert-banner r';
  var dot=document.createElement('span');dot.className='alert-dot';banner.appendChild(dot);
  var txt=document.createElement('span');txt.textContent='Your neighbor needs help';banner.appendChild(txt);
  c.appendChild(banner);

  var card=document.createElement('div');card.className='person-card r r1';
  var name=document.createElement('div');name.className='person-name';name.textContent=u.name;card.appendChild(name);
  var fields=[['Address',u.address||'—',false],['Floor',String(u.floor),false],['Disability',u.disability||'None reported',true],['Medications',u.medications||'None reported',false]];
  fields.forEach(function(f){var pf=document.createElement('div');pf.className='pf';var l=document.createElement('div');l.className='pf-label';l.textContent=f[0];var v=document.createElement('div');v.className='pf-value'+(f[2]?' highlight':'');v.textContent=f[1];pf.appendChild(l);pf.appendChild(v);card.appendChild(pf)});
  c.appendChild(card);

  if(u.lat&&u.lng){var mw=document.createElement('div');mw.className='map-wrap r r2';var img=document.createElement('img');img.alt='Location';img.src='https://staticmap.openstreetmap.de/staticmap.php?center='+u.lat+','+u.lng+'&zoom=15&size=600x300&markers='+u.lat+','+u.lng+',red';mw.appendChild(img);c.appendChild(mw)}

  var actions=document.createElement('div');actions.className='actions r r3';actions.id='actions';

  var b1=document.createElement('button');b1.className='btn-action btn-onway';
  b1.textContent='I Am On My Way';
  b1.addEventListener('click',function(){b1.disabled=true;b1.textContent='Updating...';
    fetch(API+'/status',{method:'POST',headers:H,body:JSON.stringify({id:TID,status:'neighbor_en_route'})})
    .then(function(){actions.style.display='none';showResult('Status Updated','Anh knows you are coming. Please get there as quickly and safely as possible.')})
    .catch(function(){b1.disabled=false;b1.textContent='I Am On My Way'})});

  var b2=document.createElement('button');b2.className='btn-action btn-thesafe';
  b2.textContent='They Are Safe';
  b2.addEventListener('click',function(){b2.disabled=true;b2.textContent='Updating...';
    fetch(API+'/status',{method:'POST',headers:H,body:JSON.stringify({id:TID,status:'safe'})})
    .then(function(){actions.style.display='none';showResult('Thank You','Emergency responders have been notified that Anh is safe.')})
    .catch(function(){b2.disabled=false;b2.textContent='They Are Safe'})});

  actions.appendChild(b1);actions.appendChild(b2);c.appendChild(actions);

  function showResult(title,text){
    var r=document.createElement('div');r.className='result show';
    var icon=document.createElement('div');icon.className='result-icon';
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');svg.setAttribute('stroke','currentColor');svg.setAttribute('stroke-width','2.5');svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
    var pl=document.createElementNS('http://www.w3.org/2000/svg','polyline');pl.setAttribute('points','20 6 9 17 4 12');svg.appendChild(pl);icon.appendChild(svg);r.appendChild(icon);
    var h=document.createElement('h3');h.textContent=title;r.appendChild(h);
    var p=document.createElement('p');p.textContent=text;r.appendChild(p);
    c.appendChild(r);
  }
}
</script>
</body>
</html>
