<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>HandsOnDeck — Anh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--surface:#EDE8DC;--text:#1A1207;--text2:#8B7355;--accent:#C4391C;--accent-soft:rgba(196,57,28,.08);--success:#4A7C59;--success-soft:rgba(74,124,89,.1);--border:#D4C9B5;--white:#FFFDF9;--font-h:'Playfair Display',serif;--font-b:'Inter',sans-serif}
html,body{height:100%;font-family:var(--font-b);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;position:relative}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:99999;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E")}

@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@keyframes pulseRing{0%{transform:scale(.85);opacity:.5}70%,100%{transform:scale(1.25);opacity:0}}
@keyframes glowBtn{0%,100%{box-shadow:0 8px 40px rgba(196,57,28,.2)}50%{box-shadow:0 8px 56px rgba(196,57,28,.35)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes checkDraw{to{stroke-dashoffset:0}}

.r{animation:rise .55s cubic-bezier(.16,1,.3,1) both}
.r1{animation-delay:.08s}.r2{animation-delay:.16s}.r3{animation-delay:.24s}

.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;padding-top:max(env(safe-area-inset-top),48px);padding-bottom:40px}
.home-name{font-family:var(--font-h);font-size:16px;font-weight:700;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.system-active{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--success);margin-bottom:12px}
.system-active .sa-dot{width:10px;height:10px;border-radius:50%;background:var(--success);animation:pulseDot 2s ease infinite}
.status-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:50px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:36px;transition:all .3s}
.status-pill .dot{width:7px;height:7px;border-radius:50%;animation:pulseDot 2s ease infinite}
.pill-uncontacted{background:var(--accent-soft);color:var(--accent)}.pill-uncontacted .dot{background:var(--accent)}
.pill-neighbor_en_route{background:rgba(192,133,74,.1);color:#8B6A30}.pill-neighbor_en_route .dot{background:#C0854A}
.pill-safe{background:var(--success-soft);color:var(--success)}.pill-safe .dot{background:var(--success)}
.pill-unknown{background:rgba(139,115,85,.06);color:var(--text2)}.pill-unknown .dot{background:var(--text2)}

.help-zone{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.help-ring{position:absolute;width:230px;height:230px;border-radius:50%;border:1.5px solid var(--accent);opacity:0;animation:pulseRing 3s cubic-bezier(.4,0,.2,1) infinite}
.help-ring:nth-child(2){width:260px;height:260px;animation-delay:1s}
.help-ring:nth-child(3){width:290px;height:290px;animation-delay:2s}
.help-btn{position:relative;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 36% 36%,#d9503f,var(--accent) 55%,#8e2510 100%);color:#fff;border:none;font-family:var(--font-h);font-size:18px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;z-index:1;animation:glowBtn 3s ease infinite;box-shadow:0 10px 40px rgba(196,57,28,.22),inset 0 -4px 12px rgba(0,0,0,.12)}
.help-btn svg{width:32px;height:32px;margin-bottom:2px}
.help-btn:active:not(:disabled){transform:scale(.92)}
.help-btn:disabled{background:var(--border);box-shadow:none;animation:none;cursor:default}
.help-btn:disabled~.help-ring{display:none}

.btn-safe-pill{padding:14px 32px;background:transparent;color:var(--success);border:2px solid var(--success);border-radius:50px;font-family:var(--font-b);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;min-height:52px}
.btn-safe-pill svg{width:18px;height:18px}
.btn-safe-pill:active:not(:disabled){background:var(--success);color:#fff}
.btn-safe-pill:disabled{opacity:.4;cursor:default}

.home-footer{margin-top:auto;padding-top:16px;font-size:11px;color:var(--text2);text-align:center}

/* flood overlay */
.flood{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.flood.show{display:flex;animation:rise .4s cubic-bezier(.16,1,.3,1) both}
.flood-icon{width:72px;height:72px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.flood-icon svg{width:36px;height:36px;color:var(--accent)}
.flood-title{font-family:var(--font-h);font-size:28px;font-weight:900;color:var(--accent);margin-bottom:8px;line-height:1.2}
.flood-sub{font-size:15px;color:var(--text2);margin-bottom:36px;max-width:300px;line-height:1.5}
.flood-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
.flood-btns button{width:100%;height:64px;border:none;border-radius:16px;font-family:var(--font-b);font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s}
.flood-btns button:active{transform:scale(.96)}
.flood-btns .fb-help{background:var(--accent);color:#fff;box-shadow:0 6px 24px rgba(196,57,28,.2)}
.flood-btns .fb-safe{background:var(--success);color:#fff;box-shadow:0 6px 24px rgba(74,124,89,.15)}

/* sent state */
.sent{display:none;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:320px}
.sent.show{display:flex;animation:rise .5s cubic-bezier(.16,1,.3,1) both}
.sent-circle{width:80px;height:80px;border-radius:50%;background:var(--success-soft);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.sent-circle svg{width:36px;height:36px;color:var(--success)}
.sent-circle svg polyline{stroke-dasharray:36;stroke-dashoffset:36;animation:checkDraw .5s ease .3s forwards}
.sent h2{font-family:var(--font-h);font-size:24px;font-weight:800;margin-bottom:8px}
.sent p{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:24px}

.safe-toast{display:none;position:fixed;bottom:max(env(safe-area-inset-bottom),24px);left:24px;right:24px;background:var(--success);color:#fff;padding:18px;border-radius:16px;text-align:center;font-weight:700;font-size:15px;z-index:200;animation:rise .4s cubic-bezier(.16,1,.3,1) both}
.safe-toast.show{display:block}
</style>
</head>
<body>

<div class="flood" id="flood">
  <div class="flood-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
  <div class="flood-title r">Flood Watch Detected<br>In Your Area</div>
  <div class="flood-sub r r1">Do you need help evacuating?</div>
  <div class="flood-btns r r2">
    <button class="fb-help" id="flood-help">I NEED HELP</button>
    <button class="fb-safe" id="flood-safe">I AM SAFE</button>
  </div>
</div>

<div class="home" id="home-normal">
  <div class="home-name r">Anh</div>
  <div class="system-active r r1" id="sys-active"><span class="sa-dot"></span>System Active</div>
  <div class="status-pill pill-unknown r r2" id="status"><span class="dot"></span><span id="status-text">STANDING BY</span></div>
  <div class="help-zone r r3">
    <div class="help-ring"></div><div class="help-ring"></div><div class="help-ring"></div>
    <button class="help-btn" id="btn-help"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/></svg><span>I NEED<br>HELP</span></button>
  </div>
  <button class="btn-safe-pill" id="btn-safe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>I Am Safe</span></button>
  <div class="home-footer" id="footer">Last updated: --:--:--</div>
</div>

<div class="sent" id="sent">
  <div class="sent-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h2>Help is coming</h2>
  <p>Your neighbors have been notified. Stay where you are if it is safe to do so.</p>
  <button class="btn-safe-pill" id="btn-safe-2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>I Am Safe</span></button>
</div>

<div class="safe-toast" id="safe-toast">You have been marked safe. Stay alert.</div>

<script>
var API=window.location.origin,H={'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},UID='demo-anh';
var LABELS={uncontacted:'HELP REQUESTED',neighbor_en_route:'NEIGHBOR EN ROUTE',safe:'SAFE'};

setInterval(poll,3000);poll();

function poll(){
  fetch(API+'/alert',{headers:{'ngrok-skip-browser-warning':'1'}}).then(function(r){return r.json()}).then(function(d){
    if(d.alert)document.getElementById('flood').classList.add('show');
    else document.getElementById('flood').classList.remove('show');
  }).catch(function(){});
  fetch(API+'/users',{headers:{'ngrok-skip-browser-warning':'1'}}).then(function(r){return r.json()}).then(function(d){
    var users=Array.isArray(d)?d:(d.users||[]);var me=users.find(function(u){return u.id===UID});
    if(me){var p=document.getElementById('status');p.className='status-pill pill-'+(me.status||'unknown');document.getElementById('status-text').textContent=LABELS[me.status]||'STANDING BY'}
    document.getElementById('footer').textContent='Last updated: '+new Date().toLocaleTimeString();
  }).catch(function(){});
}

function sendHelp(){
  document.getElementById('btn-help').disabled=true;
  fetch(API+'/status',{method:'POST',headers:H,body:JSON.stringify({id:UID,status:'uncontacted'})})
  .then(function(r){return r.json()})
  .then(function(){
    document.getElementById('home-normal').style.display='none';
    document.getElementById('sent').classList.add('show');
    document.getElementById('flood').classList.remove('show');
    fetch(API+'/notify/'+UID,{method:'POST',headers:H}).catch(function(){});
  }).catch(function(){document.getElementById('btn-help').disabled=false});
}

function markSafe(){
  fetch(API+'/status',{method:'POST',headers:H,body:JSON.stringify({id:UID,status:'safe'})})
  .then(function(){
    document.getElementById('flood').classList.remove('show');
    var t=document.getElementById('safe-toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000);
    poll();
  }).catch(function(){});
}

document.getElementById('flood-help').addEventListener('click',sendHelp);
document.getElementById('btn-help').addEventListener('click',sendHelp);
document.getElementById('flood-safe').addEventListener('click',markSafe);
document.getElementById('btn-safe').addEventListener('click',markSafe);
document.getElementById('btn-safe-2').addEventListener('click',markSafe);
</script>
</body>
</html>
